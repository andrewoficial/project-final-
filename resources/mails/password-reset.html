<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <title>JiraRush - reset password</title>
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type"/>
</head>
<body>
<p th:text="#{password.reset.greeting(${user.firstName})}">Hello, User.</p>
<p th:text="#{password.reset.text(${user.email})}">We received a request to reset password for ...</p>
<a th:href="${resetUrl}" th:text="#{password.reset.button}">Reset password</a>
</body>
</html>
