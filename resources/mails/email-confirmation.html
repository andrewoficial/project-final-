<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>JiraRush - email confirmation</title>
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type"/>
</head>
<body>
<p th:text="#{email.confirmation.greeting(${user.firstName})}">Hello, User.</p>
<p th:text="#{email.confirmation.text}">Please confirm your email.</p>
<a th:href="${confirmationUrl}" th:text="#{email.confirmation.button}">Confirm email</a>
</body>
</html>
